# ─── Base de données MySQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/uchk_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ─── Initialisation SQL ───────────────────────────────────────────────────────
# FIX: point-virgule en trop retiré (mode=never; → mode=never)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ─── Jackson – Sérialisation des dates ───────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# ─── Serveur ─────────────────────────────────────────────────────────────────
server.port=8080

# ─── JWT ─────────────────────────────────────────────────────────────────────
# FIX: clé allongée à 64+ chars pour satisfaire HMAC-SHA512 (jjwt 0.11.5)
jwt.secret=uchk-backend-secret-key-2026-very-long-secure-key-minimum-512bits-pour-hmacsha512-ok
jwt.expiration=86400000

# ─── Upload de fichiers ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Swagger / OpenAPI ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.default-produces-media-type=application/json
fichiers.upload-dir=uploads
